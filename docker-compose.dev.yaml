services:
  db:
    image: postgres:17.2
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
    - .env
    networks:
      - nginx_network

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    env_file:
      - .env
    networks:
      - nginx_network

  web:
    build:
      context: .
    command: bash -c "uv run python manage.py migrate && uv run python manage.py runserver 0.0.0.0:${DJANGO_PORT}"
    volumes:
      - .:/usr/src/app
    ports:
      - "${DJANGO_PORT}:${DJANGO_PORT}"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    networks:
      - nginx_network

  nginx:
    image: nginx:latest
    ports:
      - "${NGINX_PORT}:${NGINX_PORT}"
    volumes:
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf
      - ./static:/etc/nginx/html/static/
      - ./media:/etc/nginx/html/media/
    depends_on:
      - web
    networks:
      - nginx_network

volumes:
  postgres_data:
  redis_data:

networks:
  nginx_network:
    driver: bridge
